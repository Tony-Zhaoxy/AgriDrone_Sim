%YAML:1.0
---
verbosity: "WARNING"
use_fej: true
integration: "rk4"
use_stereo: true
max_cameras: 2
use_aruco: false

calib_cam_extrinsics: false
calib_cam_intrinsics: false
calib_cam_timeoffset: false
calib_imu_intrinsics: false
calib_imu_g_sensitivity: false

max_clones: 11
max_slam: 75
max_slam_in_update: 25
max_msckf_in_update: 40
dt_slam_delay: 1.0

gravity_mag: 9.81
feat_rep_msckf: "GLOBAL_3D"
feat_rep_slam: "ANCHORED_MSCKF_INVERSE_DEPTH"
feat_rep_aruco: "ANCHORED_MSCKF_INVERSE_DEPTH"

try_zupt: false
zupt_chi2_multipler: 0.0
zupt_max_velocity: 0.1
zupt_noise_multiplier: 10.0
zupt_max_disparity: 0.5
zupt_only_at_beginning: false

num_pts: 250
num_aruco: 0
fast_threshold: 20
grid_x: 5
grid_y: 4
min_px_dist: 10
use_klt: true
downsample_cameras: false
downsize_aruco: false
num_opencv_threads: 0
histogram_method: "NONE"
knn_ratio: 0.85
track_frequency: 30.0

up_msckf_sigma_px: 1.0
up_msckf_chi2_multipler: 1.0
up_slam_sigma_px: 1.0
up_slam_chi2_multipler: 1.0
up_aruco_sigma_px: 1.0
up_aruco_chi2_multipler: 1.0

init_window_time: 1.0
init_imu_thresh: 1.5
init_max_disparity: 1.0
init_max_features: 30
init_dyn_use: false
init_dyn_mle_opt_calib: false
init_dyn_mle_max_iter: 20
init_dyn_mle_max_threads: 4
init_dyn_mle_max_time: 0.10
init_dyn_num_pose: 6
init_dyn_min_deg: 5.0
init_dyn_inflation_ori: 10.0
init_dyn_inflation_vel: 10.0
init_dyn_inflation_bg: 10.0
init_dyn_inflation_ba: 10.0
init_dyn_min_rec_cond: 1.0e-12
init_dyn_bias_g: [0.0, 0.0, 0.0]
init_dyn_bias_a: [0.0, 0.0, 0.0]

topic_imu: "/d455/d455/imu"
topic_camera0: "/d455/d455/infra1/image_rect_raw"
topic_camera1: "/d455/d455/infra2/image_rect_raw"

relative_config_imu: "d455_imu_chain.yaml"
relative_config_imucam: "d455_imucam_chain.yaml"

record_timing_information: false
record_timing_filepath: "/tmp/openvins_timing.txt"
use_mask: false

publish_path: true
publish_points: false
output_pose_topic: "/poseimu"
output_path_topic: "/pathimu"
